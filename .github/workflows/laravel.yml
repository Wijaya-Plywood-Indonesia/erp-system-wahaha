name: Laravel 12 CI/CD Full Automation

on:
  push:
    branches: ["main"]
  create:
    tags: ["v*"]

jobs:
  # ------------------------------------------------------------
  # JOB 1: TESTING (CI) - TIDAK ADA PERUBAHAN
  # ------------------------------------------------------------
  laravel-tests:
      name: Run Tests (CI)
      runs-on: ubuntu-latest
      services:
        mariadb:
          image: mariadb:10.6
          env:
            MARIADB_ROOT_PASSWORD: password
            MARIADB_DATABASE: laravel_testing
          ports:
            - 3306:3306
          options: >-
            --health-cmd="healthcheck.sh --connect --innodb_initialized"
            --health-interval=10s
            --health-timeout=5s
            --health-retries=3
      steps:
        - uses: actions/checkout@v4
  
        - name: Setup PHP 8.4
          uses: shivammathur/setup-php@v2
          with:
            php-version: "8.4"
            extensions: mbstring, dom, fileinfo, mysql, pdo_mysql
  
        # 1. Setup Node.js v20 (Direkomendasikan untuk stabilitas Vite)
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20
  
        - name: Copy .env
          run: php -r "file_exists('.env') || copy('.env.example', '.env');"
  
        - name: Install Dependencies
          run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
  
        # 2. Jalankan Build Vite sebelum perintah Artisan agar manifest.json terbentuk 👈
        - name: Install NPM Dependencies & Build Assets
          run: |
            npm install
            npm run build
  
        - name: Generate App Key
          run: php artisan key:generate
  
        - name: Set Permissions
          run: chmod -R 777 storage bootstrap/cache
  
        - name: Run Migrations (Testing)
          env:
            DB_CONNECTION: mysql
            DB_HOST: 127.0.0.1
            DB_PORT: 3306
            DB_DATABASE: laravel_testing
            DB_USERNAME: root
            DB_PASSWORD: password
          run: php artisan migrate
  
        - name: Run Tests
          env:
            DB_CONNECTION: mysql
            DB_HOST: 127.0.0.1
            DB_PORT: 3306
            DB_DATABASE: laravel_testing
            DB_USERNAME: root
            DB_PASSWORD: password
          run: php artisan test

  # ------------------------------------------------------------
  # JOB 3: DEPLOY PRODUCTION (MULTI-SITE)
  # ------------------------------------------------------------
  deploy-production:
    name: Deploy to wahana.wijayaplywoods.com
    needs: laravel-tests
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP for Production
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Create temporary .env
        run: |
          echo "APP_KEY=base64:dummykeydummykeydummykeydummykey=" > .env
          echo "BROADCAST_CONNECTION=log" >> .env
          echo "PUSHER_APP_KEY=dummy" >> .env
          echo "PUSHER_APP_SECRET=dummy" >> .env
          echo "PUSHER_APP_ID=dummy" >> .env
          echo "PUSHER_APP_CLUSTER=ap1" >> .env

      - name: Install Composer Dependencies (Prod)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-scripts

      - name: Run package discover
        run: php artisan package:discover --ansi

      # --- Build Frontend (Disederhanakan)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install NPM & Build Assets
        run: |
          npm ci
          npm run build

      # --- Validasi Build
      - name: Verify build assets exist
        run: |
          if [ -f "public/build/manifest.json" ]; then
            echo "✅ Manifest.json ditemukan!"
          else
            echo "❌ ERROR: public/build/manifest.json tidak ditemukan setelah build!"
            exit 1
          fi

      # --- Create ZIP (Build Once)
      - name: Create ZIP package
        run: |
          set -euo pipefail
          BUILD_DIR=./build_deploy
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          # Pastikan public/build TIDAK masuk daftar exclude
          rsync -a --delete \
          --exclude '.git/' \
          --exclude '.github/' \
          --exclude 'node_modules/' \
          --exclude 'tests/' \
          --exclude '.env' \
          --exclude 'storage/' \
          --exclude 'build_deploy/' \
          --exclude 'deploy.zip' \
          ./ "$BUILD_DIR/"
          
          (cd "$BUILD_DIR" && zip -r ../deploy.zip . -q)
          
      # --- Setup SSH
      - name: Setup SSH Key
        run: |
          mkdir -p $HOME/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > $HOME/.ssh/id_ed25519
          chmod 600 $HOME/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> $HOME/.ssh/known_hosts

      # --- Upload & Deploy
      - name: Upload ZIP to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.zip"
          target: "/home/${{ secrets.SSH_USERNAME }}"

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            TARGET_DIR="/home/${{ secrets.SSH_USERNAME }}/wahana.wijayaplywoods.com"
            cd "$TARGET_DIR"
            php artisan down || true
            
            # Hapus file lama kecuali storage dan .env
            find . -mindepth 1 -maxdepth 1 ! -name 'storage' ! -name '.env' -exec rm -rf {} \;
            
            unzip -oq ../deploy.zip -d .
            
            # Optimasi
            php artisan optimize:clear
            php artisan migrate --force
            php artisan up
            
            rm /home/${{ secrets.SSH_USERNAME }}/deploy.zip
            echo "✅ Deployment Success!"
